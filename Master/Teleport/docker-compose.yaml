#version: '3'
services:
  configure:
    image: public.ecr.aws/gravitational/teleport:14.3.36
    container_name: teleport-configure-dev
    entrypoint: /bin/sh
    hostname: 10.83.118.94
    command: -c "if [ ! -f /etc/teleport/teleport.yaml ]; then teleport configure > /etc/teleport/teleport.yaml; fi"
    volumes:
      - /home/ozlab/.config/teleport/config:/etc/teleport

  teleport:
    image: public.ecr.aws/gravitational/teleport:14.3.36
    container_name: teleport-dev
    entrypoint: /bin/sh
    hostname: 10.83.118.94
    command: -c "sleep 1 && /bin/dumb-init teleport start -c /etc/teleport/teleport.yaml"
    ports:
      - "3023:3023"
      - "3024:3024"
      - "3025:3025"
      - "3080:3080"
    volumes:
      - /home/ozlab/.config/teleport/config:/etc/teleport
      - /home/ozlab/.config/teleport/data:/var/lib/teleport
    depends_on:
      - configure
